name: Linux Homebrew

on: [push, pull_request]

env:
  QTIFWVER: 4.8.1
  APPIMAGEVER: continuous

jobs:
  build:
    name: Build x86_64
    runs-on: ubuntu-24.04
    strategy:
      max-parallel: 10
      fail-fast: false
      matrix:
       include:
         - compiler: gcc
           use_system_gcc: 1
           upload: 1
         - compiler: clang
           upload: 0
    env:
      DISTRO: homebrew
      COMPILER: ${{ matrix.compiler }}
      USE_SYSTEM_GCC: ${{ matrix.use_system_gcc }}
      BREW_GCC_VERSION: ${{ matrix.gcc_version }}
      ARCHITECTURE: amd64
      UPLOAD: ${{ matrix.upload }}
      DAILY_BUILD: ${{ !startsWith(github.ref, 'refs/tags/') && 1 || 0 }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          token: ${{ secrets.UPLOAD_TOKEN }}
      - name: Install Homebrew
        run: |
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          echo "/home/linuxbrew/.linuxbrew/bin" >> $GITHUB_PATH
          echo "/home/linuxbrew/.linuxbrew/sbin" >> $GITHUB_PATH
      - name: Install dependencies
        run: |
          chmod +x ports/ci/linux-brew/install.sh
          ./ports/ci/linux-brew/install.sh
      - name: Build
        run: |
          chmod +x ports/ci/linux-brew/build.sh
          ./ports/ci/linux-brew/build.sh
      - name: Deploy
        run: |
          chmod +x ports/ci/linux-brew/deploy.sh
          ./ports/ci/linux-brew/deploy.sh
      - name: VirusTotal Scan
        uses: crazy-max/ghaction-virustotal@v4
        if: ${{ matrix.upload }}
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: |
            webcamoid-packages/linux-homebrew-gcc/*
      - name: Release Upload
        uses: softprops/action-gh-release@v3
        if: ${{ startsWith(github.ref, 'refs/tags/') && matrix.upload }}
        with:
          repository: webcamoid/WebcamoidPrivate
          files: webcamoid-packages/linux-homebrew-gcc/*
          token: ${{ secrets.UPLOAD_TOKEN }}
      - name: Daily Build Upload
        uses: softprops/action-gh-release@v3
        if: ${{ !startsWith(github.ref, 'refs/tags/') && matrix.upload && github.ref == 'refs/heads/master' }}
        with:
          repository: webcamoid/WebcamoidPrivate
          body: "${{ github.event.head_commit.message }} (commit: [${{ github.sha }}](https://github.com/webcamoid/webcamoid/commit/${{ github.sha }}))<hr>**Note**: Ignore the commit information of the tag, the files in the release keep updating with every new build, these packages were built from [${{ github.sha }}](https://github.com/webcamoid/webcamoid/commit/${{ github.sha }}) commit."
          prerelease: true
          files: webcamoid-packages/linux-homebrew-gcc/*
          name: Daily Build
          tag_name: daily-build
          token: ${{ secrets.UPLOAD_TOKEN }}
  multiarch:
    name: Build ARM 64
    runs-on: ubuntu-24.04-arm
    strategy:
      max-parallel: 10
      fail-fast: false
      matrix:
       include:
         - compiler: gcc
           use_system_gcc: 1
           upload: 1
         - compiler: clang
           upload: 0
    env:
      DISTRO: homebrew
      COMPILER: ${{ matrix.compiler }}
      USE_SYSTEM_GCC: ${{ matrix.use_system_gcc }}
      BREW_GCC_VERSION: ${{ matrix.gcc_version }}
      ARCHITECTURE: arm64v8
      UPLOAD: ${{ matrix.upload }}
      DAILY_BUILD: ${{ !startsWith(github.ref, 'refs/tags/') && 1 || 0 }}
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: true
          token: ${{ secrets.UPLOAD_TOKEN }}
      - name: Install Homebrew
        run: |
          /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          echo "/home/linuxbrew/.linuxbrew/bin" >> $GITHUB_PATH
          echo "/home/linuxbrew/.linuxbrew/sbin" >> $GITHUB_PATH
      - name: Install dependencies
        run: |
          chmod +x ports/ci/linux-brew/install.sh
          ./ports/ci/linux-brew/install.sh
      - name: Build
        run: |
          chmod +x ports/ci/linux-brew/build.sh
          ./ports/ci/linux-brew/build.sh
      - name: Deploy
        run: |
          chmod +x ports/ci/linux-brew/deploy.sh
          ./ports/ci/linux-brew/deploy.sh
      - name: VirusTotal Scan
        uses: crazy-max/ghaction-virustotal@v4
        if: ${{ matrix.upload }}
        with:
          vt_api_key: ${{ secrets.VT_API_KEY }}
          files: |
            webcamoid-packages/linux-homebrew-gcc/*
      - name: Release Upload
        uses: softprops/action-gh-release@v3
        if: ${{ startsWith(github.ref, 'refs/tags/') && matrix.upload }}
        with:
          repository: webcamoid/WebcamoidPrivate
          files: webcamoid-packages/linux-homebrew-gcc/*
          token: ${{ secrets.UPLOAD_TOKEN }}
      - name: Daily Build Upload
        uses: softprops/action-gh-release@v3
        if: ${{ !startsWith(github.ref, 'refs/tags/') && matrix.upload && github.ref == 'refs/heads/master' }}
        with:
          repository: webcamoid/WebcamoidPrivate
          body: "${{ github.event.head_commit.message }} (commit: [${{ github.sha }}](https://github.com/webcamoid/webcamoid/commit/${{ github.sha }}))<hr>**Note**: Ignore the commit information of the tag, the files in the release keep updating with every new build, these packages were built from [${{ github.sha }}](https://github.com/webcamoid/webcamoid/commit/${{ github.sha }}) commit."
          prerelease: true
          files: webcamoid-packages/linux-homebrew-gcc/*
          name: Daily Build
          tag_name: daily-build
          token: ${{ secrets.UPLOAD_TOKEN }}
